<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 | Keynes Zeng的个人博客</title>
    <meta name="description" content="博客文章详情">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="/" class="logo">📋 Keynes Zeng</a>
            <nav class="nav">
                <a href="/" class="nav-link">首页</a>
                <a href="/blog.html" class="nav-link">文章</a>
                <a href="/about.html" class="nav-link">关于</a>
            </nav>
            <button id="themeToggle" class="theme-toggle" aria-label="切换主题">
                <span class="icon-sun">☀️</span>
                <span class="icon-moon">🌙</span>
            </button>
            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
        <nav class="mobile-nav" id="mobileNav">
            <a href="/" class="nav-link">首页</a>
            <a href="/blog.html" class="nav-link">文章</a>
            <a href="/about.html" class="nav-link">关于</a>
        </nav>
    </header>

    <section class="section">
        <div class="container">
            <article class="post-article" id="postContent">
                <!-- 由 JS 动态渲染 -->
            </article>
            <div id="postNav" class="post-navigation">
                <!-- 上下篇文章导航 -->
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container footer-inner">
            <div class="footer-info">
                <p>© <span id="year"></span> Keynes Zeng的个人博客</p>
                <p>用 ❤️ 和 ☕ 打造</p>
            </div>
            <div class="footer-links">
                <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
                <a href="mailto:hello@example.com">邮件</a>
                <a href="#">RSS</a>
            </div>
        </div>
    </footer>

    <script src="js/posts.js"></script>
    <script src="js/post.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
